<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2010-2025</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #EAE4DA; 
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow-y: auto; 
            font-family: 'NotoSansKR-VariableFont_wght', sans-serif;
            box-sizing: border-box;
            padding: 60px 0; 
        }
        .card-link {
            text-decoration: none;
            color: inherit;
            flex: 1;
            height: 100%;
            display: flex;
            margin-right: -4px;
            box-sizing: border-box;
            transition: flex 0.4s cubic-bezier(0.25, 1, 0.5, 1), opacity 0.4s ease, height 0.4s ease;
        }
        .card-link:last-child {
            margin-right: 0;
        }

        .title-container {
            position: absolute;
            top: 5vh;
            left: 5vw;
            display: flex;
            flex-direction: column;
            gap: 5px;
        }
        .archive-title {
            color: #F7810A;
            font-size: 5vw;
            font-weight: 900;
            letter-spacing: -2px;
            margin: 0;
            line-height: 1;
        }
        .accordion-wrapper {
            display: flex;
            width: 90vw;
            height: 55vh;
            min-height: 380px; 
            margin-top: 12vh;
            background-color: transparent;
            box-sizing: border-box;
        }

        .card {
            position: relative;
            width: 100%;
            height: 100%;
            background-color: #ffffff;
            border: 4px solid #F7810A; 
            overflow: hidden;
            cursor: pointer;
            box-sizing: border-box;
        }

        .card img {
            width: 100%;
            height: 82%;
            object-fit: contain;
            padding: 20px;
            box-sizing: border-box;
            filter: grayscale(100%); 
            background-color: #fff;
            transition: filter 0.4s ease;
        }

        .card .year-label {
            height: 18%;
            border-top: 4px solid #F7810A;
            background-color: #D66F08; 
            color: #ffffff;
            font-size: 20px;
            font-weight: 900;
            display: flex;
            align-items: center;
            justify-content: center;
            letter-spacing: 1px;
            box-sizing: border-box;
            transition: background-color 0.3s ease;
        }

        
        .accordion-wrapper:hover .card-link:hover {
            flex: 3.5; 
        }
        .accordion-wrapper:hover .card-link:hover img {
            filter: grayscale(0%);
        }
        .accordion-wrapper:hover .card-link:hover .year-label {
            background-color: #D66F08; 
        }
        .accordion-wrapper:hover .card-link:not(:hover) {
            flex: 0.5;
            opacity: 0.4; 
        }

       
        @media (max-width: 1024px) {
            body {
                justify-content: flex-start; 
                padding: 40px 0;
            }
            .title-container {
                position: relative; 
                top: 0;
                left: 0;
                align-items: center;
                margin-bottom: 40px;
                width: 100%;
            }
            .archive-title {
                font-size: 36px; 
                margin-bottom: 8px;
            }
            .archive-subtitle {
                font-size: 15px;
            }
            .accordion-wrapper {
                flex-direction: column;
                height: auto; 
                min-height: auto;
                width: 85vw;
                margin-top: 0;
            }
            .card-link {
                margin-right: 0;
                margin-bottom: -4px;
                flex-direction: column;
                height: 150px; 
                flex: none !important; 
            }
            .card-link:last-child {
                margin-bottom: 0;
            }
            .card img {
                height: 72%;
                padding: 15px;
            }
            .card .year-label {
                height: 28%;
                font-size: 16px;
            }
            
            
            .accordion-wrapper:hover .card-link:hover {
                height: 200px; 
            }
            .accordion-wrapper:hover .card-link:not(:hover) {
                height: 130px; 
                opacity: 0.5;
            }
        }
        .card-link[href*="2025"] .card img {
    padding: 0px; 
}
    </style>
</head>
<body>

    <div class="title-container">
        <h1 class="archive-title">2010-2025</h1>
    </div>

    <div class="accordion-wrapper">
        
        <a href="https://youtu.be/XUH7S0yz2L0?si=9tRV8PS6bASf2vFx" target="_blank" class="card-link">
            <div class="card">
                <img src="images/2010(2).png" alt="2010">
                <div class="year-label">2010</div>
            </div>
        </a>

        <a href="https://youtu.be/5vA88B5dYP4?si=sECkN9jvPTS_gQLO" target="_blank" class="card-link">
            <div class="card">
                <img src="images/2013.png" alt="2013">
                <div class="year-label">2013</div>
            </div>
        </a>

        <a href="https://youtu.be/mbToP1NB1Bk?si=fG4kFTyPivmEV0ER" target="_blank" class="card-link">
            <div class="card">
                <img src="images/2016(2).png" alt="2016">
                <div class="year-label">2016</div>
            </div>
        </a>

        <a href="https://www.nongshim.com/promotion/event/view/2021/09_ansung_hangeul/ansung_hangeul_event" target="_blank" class="card-link">
            <div class="card">
                <img src="images/2021(2).png" alt="2021">
                <div class="year-label">2021</div>
            </div>
        </a>

        <a href="http://www.dailysmart.co.kr/news/articleView.html?idxno=64128" target="_blank" class="card-link">
            <div class="card">
                <img src="images/2022.png" alt="2022">
                <div class="year-label">2022</div>
            </div>
        </a>

        <a href="https://www.nongshim.com/promotion/event/view/2025/09_ansung/ansung_event" target="_blank" class="card-link">
            <div class="card">
                <img src="images/2025(5).png" alt="2025">
                <div class="year-label">2025</div>
            </div>
        </a>
    </div>

</body>
</html>
