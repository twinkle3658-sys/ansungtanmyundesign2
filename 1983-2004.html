<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>1983-2004</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #EAE4DA;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow-y: auto;
            font-family: 'NotoSansKR-VariableFont_wght', sans-serif;
            box-sizing: border-box;
            padding: 60px 0;
        }

        
        .card-link {
            text-decoration: none;
            color: inherit;
            flex: 1;
            height: 100%;
            display: flex;
            margin-right: -4px;
            box-sizing: border-box;
            transition: flex 0.4s cubic-bezier(0.25, 1, 0.5, 1), opacity 0.4s ease, height 0.4s ease;
        }
        .card-link:last-child { margin-right: 0; }

        
        .title-container {
            position: absolute;
            top: 5vh;
            left: 5vw;
            display: flex;
            flex-direction: column;
            gap: 5px;
        }

        .archive-title {
            color: #F7810A;
            font-size: 5vw;
            font-weight: 900;
            letter-spacing: -2px;
            margin: 0;
            line-height: 1;
        }

        .accordion-wrapper {
            display: flex;
            width: 90vw;
            height: 55vh;
            min-height: 380px;
            margin-top: 12vh;
            background-color: transparent;
            box-sizing: border-box;
        }

        .card {
            position: relative;
            width: 100%;
            height: 100%;
            background-color: #ffffff;
            border: 4px solid #F7810A; 
            overflow: hidden;
            cursor: pointer;
            box-sizing: border-box;
        }

        .card img {
            width: 100%;
            height: 82%;
            object-fit: contain;
            padding: 20px;
            box-sizing: border-box;
            filter: grayscale(100%); 
            background-color: #fff;
            transition: filter 0.4s ease;
        }

        .card .year-label {
            height: 18%;
            border-top: 4px solid #F7810A;
            background-color: #D66F08; 
            color: #ffffff;
            font-size: 20px;
            font-weight: 900;
            display: flex;
            align-items: center;
            justify-content: center;
            letter-spacing: 1px;
            box-sizing: border-box;
            transition: background-color 0.3s ease;
        }

        
        .accordion-wrapper:hover .card-link:hover {
            flex: 3.5; 
        }

        .accordion-wrapper:hover .card-link:hover img {
            filter: grayscale(0%);
        }

        .accordion-wrapper:hover .card-link:hover .year-label {
            background-color: #D66F08; 
        }

        .accordion-wrapper:hover .card-link:not(:hover) {
            opacity: 0.4;
            flex: 0.5;
        }

        
        @media (max-width: 1024px) {
            body {
                justify-content: flex-start;
                padding: 40px 0;
            }
            .title-container {
                position: relative; 
                top: 0;
                left: 0;
                align-items: center;
                margin-bottom: 40px;
                width: 100%;
            }
            .archive-title {
                font-size: 36px; 
                margin-bottom: 8px;
            }
            .accordion-wrapper {
                flex-direction: column;
                height: auto; 
                min-height: auto;
                width: 85vw;
                margin-top: 0;
            }
            .card-link { 
                margin-right: 0; 
                margin-bottom: -4px; 
                flex-direction: column; 
                height: 150px; 
                flex: none !important; 
            }
            .card-link:last-child { margin-bottom: 0; }
            .card img { height: 72%; padding: 15px; }
            .card .year-label { height: 28%; font-size: 16px; }
            
            
            .accordion-wrapper:hover .card-link:hover {
                height: 200px; 
            }
            .accordion-wrapper:hover .card-link:not(:hover) {
                height: 130px; 
                opacity: 0.5;
            }
        }
    </style>
</head>
<body>

    <div class="title-container">
        <h1 class="archive-title">1983-2004</h1>
    </div>

    <div class="accordion-wrapper">
        
        <a href="https://youtu.be/UsrxSRu1JnQ?si=vCri9nSSX12fdjHl" target="_blank" class="card-link">
            <div class="card">
                <img src="images/1983.jpg" alt="1983">
                <div class="year-label">1983</div>
            </div>
        </a>

        <a href="https://youtu.be/r8puEVPzM7I?si=5wBH-LooxWGUYaEc" target="_blank" class="card-link">
            <div class="card">
                <img src="images/1992.jpg" alt="1992">
                <div class="year-label">1992</div>
            </div>
        </a>

        <a href="https://youtu.be/IRnQSocdcUI?si=7ONFKgMchkewMi40" target="_blank" class="card-link">
            <div class="card">
                <img src="images/1999.png" alt="1999">
                <div class="year-label">1999</div>
            </div>
        </a>

        <a href="https://youtu.be/xYklDj9SPxM?si=smMTXQaFSzYzsGBl" target="_blank" class="card-link">
            <div class="card">
                <img src="images/2002.png" alt="2002">
                <div class="year-label">2002</div>
            </div>
        </a>

        <a href="https://youtu.be/mGlCH5mzOUc?si=VTrDNECWT-WmRxMH" target="_blank" class="card-link">
            <div class="card">
                <img src="images/2004(2).png" alt="2004">
                <div class="year-label">2004</div>
            </div>
        </a>

    </div>

</body>
</html>
